name: CI

on:
  push:
    branches: [main, 'codex/**']
  pull_request:

permissions:
  contents: read

jobs:
  manifest-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate manifest schema
        run: npm run validate:manifests

      - name: Regenerate catalogs
        run: npm run generate:catalog

      - name: Check generated files are committed
        run: git diff --exit-code apps/tools-web/src/generated/tool-manifests.ts services/tools-api/config/tool-manifests.json

  web-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: cargo install wasm-pack --locked

      - name: Install dependencies
        run: npm ci

      - name: Build web
        run: npm run build:web

  rust-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run tests
        run: cargo test --workspace
