services:
  tools-api:
    image: ${TOOLS_API_IMAGE:-tools-api:local}
    build:
      context: .
      dockerfile: services/tools-api/Dockerfile
    restart: unless-stopped
    user: "0:0"
    environment:
      CLIPBOARD_DB_PATH: /app/data/clipboard.db
    expose:
      - "8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/api/readyz >/dev/null || exit 1"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 10s
    volumes:
      - tools-api-data:/app/data
    networks:
      - dokploy-network

  tools-web:
    image: ${TOOLS_WEB_IMAGE:-tools-web:local}
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.web
    restart: unless-stopped
    depends_on:
      tools-api:
        condition: service_healthy
    expose:
      - "80"
    networks:
      - dokploy-network

networks:
  dokploy-network:
    external: true

volumes:
  tools-api-data:
