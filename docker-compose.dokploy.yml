services:
  tools-api:
    image: ${TOOLS_API_IMAGE:-tools-api:local}
    build:
      context: .
      dockerfile: services/tools-api/Dockerfile
    restart: unless-stopped
    expose:
      - "8080"
    networks:
      - dokploy-network

  tools-web:
    image: ${TOOLS_WEB_IMAGE:-tools-web:local}
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.web
    restart: unless-stopped
    depends_on:
      - tools-api
    expose:
      - "80"
    networks:
      - dokploy-network

networks:
  dokploy-network:
    external: true
